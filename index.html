<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ui-audit-dashboard Repository Index</title>
  <style>
    /* Theme tokens */
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --bg-accent: #e8eef8;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --text: #172033;
      --muted: #68758a;
      --border: #dce3ef;
      --primary: #2563eb;
      --primary-soft: #eaf1ff;
      --shadow: 0 24px 70px rgba(15, 23, 42, 0.11);
      --item-shadow: 0 10px 24px rgba(15, 23, 42, 0.07);
    }

    body.dark {
      color-scheme: dark;
      --bg: #0e1422;
      --bg-accent: #172033;
      --surface: #141c2d;
      --surface-soft: #1b263a;
      --text: #eef4ff;
      --muted: #a6b3c7;
      --border: #2d3a52;
      --primary: #7aa7ff;
      --primary-soft: #1f3154;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      --item-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
    }

    /* Page layout */
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, var(--bg-accent), transparent 34rem),
        var(--bg);
      color: var(--text);
    }

    main {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    .shell {
      overflow: hidden;
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    /* Header and controls */
    .hero {
      display: grid;
      gap: 24px;
      padding: 32px;
      border-bottom: 1px solid var(--border);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .repo-mark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .repo-mark span:first-child {
      display: grid;
      width: 40px;
      height: 40px;
      place-items: center;
      background: var(--primary-soft);
      border-radius: 14px;
      color: var(--primary);
      font-size: 1.2rem;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.2rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .intro {
      max-width: 680px;
      margin: 0;
      color: var(--muted);
      font-size: 1.04rem;
      line-height: 1.7;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap span {
      position: absolute;
      top: 50%;
      left: 16px;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    input[type="search"] {
      width: 100%;
      min-height: 48px;
      padding: 0 16px 0 46px;
      color: var(--text);
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 16px;
      font: inherit;
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    input[type="search"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary) 20%, transparent);
    }

    button {
      min-height: 48px;
      padding: 0 16px;
      color: var(--text);
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: var(--primary);
    }

    /* Repository contents */
    .content {
      padding: 22px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 10px 18px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .breadcrumb {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      min-width: 0;
    }

    .breadcrumb a,
    .breadcrumb span {
      color: var(--muted);
      text-decoration: none;
    }

    .breadcrumb a:hover {
      color: var(--primary);
    }

    .list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .item-link {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: center;
      min-height: 72px;
      padding: 16px;
      color: var(--text);
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 18px;
      text-decoration: none;
      box-shadow: 0 0 0 rgba(0, 0, 0, 0);
      transition:
        transform 180ms ease,
        border-color 180ms ease,
        box-shadow 180ms ease,
        background 180ms ease;
    }

    .item-link:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--primary) 58%, var(--border));
      background: color-mix(in srgb, var(--surface) 72%, var(--primary-soft));
      box-shadow: var(--item-shadow);
    }

    .icon {
      display: grid;
      width: 44px;
      height: 44px;
      place-items: center;
      background: var(--primary-soft);
      border-radius: 14px;
      font-size: 1.35rem;
    }

    .details {
      min-width: 0;
    }

    .name {
      overflow-wrap: anywhere;
      font-weight: 800;
      line-height: 1.3;
    }

    .path {
      margin-top: 4px;
      overflow-wrap: anywhere;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .badge {
      justify-self: end;
      padding: 6px 10px;
      color: var(--primary);
      background: var(--primary-soft);
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .state {
      padding: 34px 16px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .state strong {
      color: var(--text);
    }

    .error {
      color: #b42318;
      background: #fff1f0;
      border: 1px solid #ffd6d2;
      border-radius: 18px;
    }

    body.dark .error {
      color: #ffb4ab;
      background: #351715;
      border-color: #6d2b27;
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 20px, 960px);
        padding: 28px 0;
      }

      .shell {
        border-radius: 20px;
      }

      .hero {
        padding: 22px;
      }

      .topbar,
      .controls,
      .meta-row {
        align-items: stretch;
        flex-direction: column;
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .content {
        padding: 14px;
      }

      .item-link {
        grid-template-columns: auto 1fr;
      }

      .badge {
        grid-column: 2;
        justify-self: start;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="shell" aria-labelledby="page-title">
      <header class="hero">
        <div class="topbar">
          <div class="repo-mark" aria-label="Repository">
            <span aria-hidden="true">GH</span>
            <span id="repoLabel">ACSGenUI / ui-audit-dashboard</span>
          </div>
          <button id="themeToggle" type="button" aria-pressed="false">Dark mode</button>
        </div>

        <div>
          <h1 id="page-title">Repository Index</h1>
          <p class="intro">
            Browse the folders and files published in this GitHub Pages repository.
            The list updates automatically from the GitHub REST API.
          </p>
        </div>

        <div class="controls">
          <label class="search-wrap">
            <span aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" aria-label="Filter folders and files" placeholder="Filter folders and files..." autocomplete="off" />
          </label>
        </div>
      </header>

      <section class="content" aria-live="polite">
        <div class="meta-row">
          <nav id="breadcrumb" class="breadcrumb" aria-label="Breadcrumb"></nav>
          <span id="countLabel">Loading repository contents...</span>
        </div>
        <ul id="repoList" class="list"></ul>
        <div id="stateMessage" class="state">Loading folders and files...</div>
      </section>
    </section>
  </main>

  <script>
    /* Repository configuration
       Replace ACSGenUI with YOUR_USERNAME and ui-audit-dashboard with YOUR_REPO
       if you reuse this page in another GitHub Pages repository. */
    // const GITHUB_USERNAME = "YOUR_USERNAME";
    // const GITHUB_REPO = "YOUR_REPO";
    const GITHUB_USERNAME = "ACSGenUI";
    const GITHUB_REPO = "ui-audit-dashboard";

    /* DOM references */
    const repoLabel = document.querySelector("#repoLabel");
    const repoList = document.querySelector("#repoList");
    const stateMessage = document.querySelector("#stateMessage");
    const countLabel = document.querySelector("#countLabel");
    const breadcrumb = document.querySelector("#breadcrumb");
    const searchInput = document.querySelector("#searchInput");
    const themeToggle = document.querySelector("#themeToggle");

    let currentPath = "";
    let currentItems = [];

    /* Build the GitHub REST API URL for a folder path. */
    function getApiUrl(path = "") {
      const cleanPath = path.replace(/^\/+|\/+$/g, "");
      const baseUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/`;
      return cleanPath ? `${baseUrl}${encodeURIComponent(cleanPath).replaceAll("%2F", "/")}` : baseUrl;
    }

    /* Sort folders before files, then alphabetically by name. */
    function sortRepositoryItems(items) {
      return [...items].sort((a, b) => {
        if (a.type !== b.type) {
          return a.type === "dir" ? -1 : 1;
        }

        return a.name.localeCompare(b.name, undefined, { sensitivity: "base" });
      });
    }

    /* Create a small badge for each file type or folder. */
    function getBadgeText(item) {
      if (item.type === "dir") {
        return "Folder";
      }

      const extension = item.name.includes(".") ? item.name.split(".").pop() : "file";
      return extension || "file";
    }

    /* Convert GitHub API items into GitHub Pages or download links. */
    function getItemLink(item) {
      if (item.type === "dir") {
        return `./${item.path.replace(/\/?$/, "/")}`;
      }

      return item.download_url || item.html_url;
    }

    /* Render breadcrumb navigation for recursive folder browsing. */
    function renderBreadcrumb(path) {
      const parts = path ? path.split("/") : [];
      const crumbs = [`<a href="./" data-path="">Home</a>`];

      parts.forEach((part, index) => {
        const crumbPath = parts.slice(0, index + 1).join("/");
        crumbs.push(`<span aria-hidden="true">/</span>`);
        crumbs.push(`<a href="./${crumbPath}/" data-path="${crumbPath}">${part}</a>`);
      });

      breadcrumb.innerHTML = crumbs.join("");
    }

    /* Render the repository list and apply the active search filter. */
    function renderItems() {
      const query = searchInput.value.trim().toLowerCase();
      const filteredItems = currentItems.filter((item) => {
        return item.name.toLowerCase().includes(query) || item.path.toLowerCase().includes(query);
      });

      repoList.innerHTML = "";
      stateMessage.hidden = filteredItems.length > 0;
      countLabel.textContent = `${filteredItems.length} item${filteredItems.length === 1 ? "" : "s"}`;

      if (filteredItems.length === 0) {
        stateMessage.className = "state";
        stateMessage.textContent = query ? "No folders or files match your search." : "This folder is empty.";
        return;
      }

      const fragment = document.createDocumentFragment();

      filteredItems.forEach((item) => {
        const listItem = document.createElement("li");
        const link = document.createElement("a");
        const icon = document.createElement("span");
        const details = document.createElement("span");
        const name = document.createElement("span");
        const path = document.createElement("span");
        const badge = document.createElement("span");

        link.className = "item-link";
        link.href = getItemLink(item);
        link.dataset.type = item.type;
        link.dataset.path = item.path;

        icon.className = "icon";
        icon.textContent = item.type === "dir" ? "📁" : "📄";
        icon.setAttribute("aria-hidden", "true");

        details.className = "details";
        name.className = "name";
        name.textContent = item.name;
        path.className = "path";
        path.textContent = item.path;

        badge.className = "badge";
        badge.textContent = getBadgeText(item);

        details.append(name, path);
        link.append(icon, details, badge);
        listItem.append(link);
        fragment.append(listItem);
      });

      repoList.append(fragment);
    }

    /* Fetch repository contents from the GitHub REST API. */
    async function fetchRepositoryContents(path = "") {
      currentPath = path;
      repoList.innerHTML = "";
      stateMessage.hidden = false;
      stateMessage.className = "state";
      stateMessage.textContent = "Loading folders and files...";
      countLabel.textContent = "Loading repository contents...";
      renderBreadcrumb(path);

      try {
        const response = await fetch(getApiUrl(path), {
          headers: { Accept: "application/vnd.github+json" }
        });

        if (!response.ok) {
          throw new Error(`GitHub API returned ${response.status} ${response.statusText}`);
        }

        const data = await response.json();
        const items = Array.isArray(data) ? data : [];

        currentItems = sortRepositoryItems(items).filter((item) => {
          return item.type === "dir" || item.type === "file";
        });

        renderItems();
      } catch (error) {
        currentItems = [];
        repoList.innerHTML = "";
        countLabel.textContent = "Unable to load repository contents";
        stateMessage.hidden = false;
        stateMessage.className = "state error";
        stateMessage.innerHTML = `<strong>Something went wrong.</strong><br>${error.message}`;
      }
    }

    /* Toggle dark mode and remember the preference locally. */
    function setTheme(mode) {
      const isDark = mode === "dark";
      document.body.classList.toggle("dark", isDark);
      themeToggle.textContent = isDark ? "Light mode" : "Dark mode";
      themeToggle.setAttribute("aria-pressed", String(isDark));
      localStorage.setItem("repo-index-theme", mode);
    }

    /* Use folder clicks for in-page browsing while keeping hrefs GitHub Pages-friendly. */
    repoList.addEventListener("click", (event) => {
      const link = event.target.closest("a[data-type='dir']");

      if (!link || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) {
        return;
      }

      event.preventDefault();
      searchInput.value = "";
      fetchRepositoryContents(link.dataset.path);
    });

    breadcrumb.addEventListener("click", (event) => {
      const link = event.target.closest("a[data-path]");

      if (!link || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) {
        return;
      }

      event.preventDefault();
      searchInput.value = "";
      fetchRepositoryContents(link.dataset.path);
    });

    searchInput.addEventListener("input", renderItems);

    themeToggle.addEventListener("click", () => {
      const nextTheme = document.body.classList.contains("dark") ? "light" : "dark";
      setTheme(nextTheme);
    });

    /* Initialize the page. */
    repoLabel.textContent = `${GITHUB_USERNAME} / ${GITHUB_REPO}`;
    setTheme(localStorage.getItem("repo-index-theme") || "light");
    fetchRepositoryContents(currentPath);
  </script>
</body>
</html>
