<!doctype html>
<html class="staticrypt-html">
<head>
    <meta charset="utf-8">
    <title>ASUS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- do not cache this page -->
    <meta http-equiv="cache-control" content="max-age=0"/>
    <meta http-equiv="cache-control" content="no-cache"/>
    <meta http-equiv="expires" content="0"/>
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT"/>
    <meta http-equiv="pragma" content="no-cache"/>

    <style>
        .staticrypt-hr {
            margin-top: 20px;
            margin-bottom: 20px;
            border: 0;
            border-top: 1px solid #e5e7eb;
        }

        .staticrypt-page {
            width: 360px;
            padding: 8% 0 0;
            margin: auto;
            box-sizing: border-box;
        }

        .staticrypt-form {
            position: relative;
            z-index: 1;
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.06);
            max-width: 360px;
            margin: 0 auto 100px;
            padding: 45px;
            text-align: center;
            box-shadow:
                0 24px 48px rgba(0, 0, 0, 0.35),
                0 0 20px 0 rgba(0, 0, 0, 0.15);
            border-radius: 8px;
        }

        .staticrypt-password-container input[type="password"]::placeholder,
        .staticrypt-password-container input[type="text"]::placeholder {
            color: #6b7280;
        }

        .staticrypt-password-container input[type="password"],
        .staticrypt-password-container input[type="text"] {
            color: #111827;
            border-radius: 6px;
        }

        .staticrypt-form .staticrypt-decrypt-button {
            text-transform: none;
            font-weight: 600;
            letter-spacing: 0.02em;
            outline: 0;
            background: linear-gradient(135deg, #4a9eff 0%, #6366f1 52%, #7c3aed 100%);
            width: 100%;
            border: 0;
            padding: 15px;
            color: #FFFFFF;
            font-size: 15px;
            cursor: pointer;
            border-radius: 6px;
            box-shadow: 0 4px 14px rgba(74, 158, 255, 0.35);
            transition: filter 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
        }

        .staticrypt-form .staticrypt-decrypt-button:hover,
        .staticrypt-form .staticrypt-decrypt-button:active,
        .staticrypt-form .staticrypt-decrypt-button:focus {
            background: linear-gradient(135deg, #5aa9ff 0%, #7376f5 50%, #8b4ef5 100%);
            filter: brightness(1.05);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .staticrypt-form .staticrypt-decrypt-button:active {
            transform: translateY(1px);
        }

        .staticrypt-html {
            height: 100%;
        }

        .staticrypt-body {
            margin: 0;
            min-height: 100vh;
            background-color: #333333;
            background-image:
                radial-gradient(ellipse 120% 80% at 0% 0%, rgba(74, 158, 255, 0.14) 0%, transparent 55%),
                radial-gradient(ellipse 90% 70% at 100% 100%, rgba(124, 58, 237, 0.12) 0%, transparent 50%),
                linear-gradient(160deg, #3a3a3a 0%, #333333 35%, #2e2e2e 65%, #333333 100%);
            font-family: "Segoe UI", system-ui, -apple-system, "Arial", sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .staticrypt-instructions-line {
            font-size: 0.95em;
            color: #4b5563;
            margin: 0 0 0.75em;
            text-align: center;
        }

        .staticrypt-title {
            font-size: 1.5em;
            margin: 0;
            font-weight: 600;
            color: #111827;
            letter-spacing: -0.02em;
        }

        .staticrypt-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 0;
        }

        .staticrypt-logo {
            display: block;
            height: 40px;
            width: auto;
            max-width: 160px;
            object-fit: contain;
        }

        .staticrypt-footer {
            position: fixed;
            height: 20px;
            font-size: 16px;
            padding: 2px;
            bottom: 0;
            left: 0;
            right: 0;
            margin-bottom: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.35) 0%, transparent 100%);
        }

        .staticrypt-footer p {
            margin: 2px;
            text-align: center;
            color: rgba(255, 255, 255, 0.55);
        }

        .staticrypt-footer a {
            text-decoration: none;
        }

        .hidden {
            display: none !important;
        }

        .staticrypt-spinner-container {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .staticrypt-spinner {
            display: inline-block;
            width: 2rem;
            height: 2rem;
            vertical-align: text-bottom;
            border: 0.25em solid rgba(255, 255, 255, 0.35);
            border-right-color: transparent;
            border-radius: 50%;
            animation: spinner-border 0.75s linear infinite;
        }

        @keyframes spinner-border {
            100% {
                transform: rotate(360deg);
            }
        }

        #staticrypt_content.staticrypt-content {
            min-height: 100%;
            margin-bottom: 1em;
            background: transparent;
        }

        .staticrypt-password-container {
            position: relative;
            outline: 0;
            background: #f2f2f2;
            width: 100%;
            border: 0;
            margin: 0 0 15px;
            box-sizing: border-box;
        }

        .staticrypt-password-container input[type="password"],
        .staticrypt-password-container input[type="text"] {
            background: inherit;
            border: 0;
            box-sizing: border-box;
            font-size: 14px;
            outline: 0;
            padding: 15px 48px 15px 15px;
            width: 100%;
        }

        .staticrypt-toggle-password-visibility {
            cursor: pointer;
            height: 20px;
            opacity: 60%;
            padding: 13px;
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
        }

        label.staticrypt-remember {
            display: flex;
            align-items: center;
            margin-bottom: 1em;
            color: #111827;
        }

        .staticrypt-remember input[type="checkbox"] {
            transform: scale(1.5);
            margin-right: 1em;
        }

        @media screen and (-webkit-min-device-pixel-ratio: 0) {
            .staticrypt-password-container input[type="password"],
            .staticrypt-password-container input[type="text"] {
                font-size: 16px;
            }
        }
    </style>
</head>
