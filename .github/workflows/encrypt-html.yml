name: Encrypt HTML (delta)

on:
  push:
    branches:
      - main
    paths:
      - '**/*.html'
      - '**/*.csv'
      - '**/*.json'
      - '!password-template/**'
      - '!.github/**'

jobs:
  encrypt:
    permissions:
      contents: write
    uses: ./.github/workflows/encrypt-reports-reusable.yml
    with:
      mode: delta
      commit_msg: 'chore: encrypt changed HTML from main'
      before_sha: ${{ github.event.before }}
